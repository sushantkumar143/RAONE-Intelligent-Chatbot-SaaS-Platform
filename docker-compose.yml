services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-raone}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    # environment:
    #   DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-raone}
    #   GROQ_API_KEY: ${GROQ_API_KEY}
    #   OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    #   HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY}
    #   JWT_SECRET_KEY: ${JWT_SECRET_KEY:-raone-super-secret-key}
    env_file:
      - ./backend/.env
    volumes:
      - backend_uploads:/app/uploads
      - faiss_data:/app/data/faiss_indices
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: always
    env_file:
      - ./frontend/.env
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
  faiss_data:
