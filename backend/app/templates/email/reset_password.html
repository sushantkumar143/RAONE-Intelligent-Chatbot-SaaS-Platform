<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>RAONE - Password Reset</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0B0F19;
            color: #FFFFFF;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .card {
            background-color: #1A1F2E;
            border-radius: 16px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .logo {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 24px;
            color: #FFFFFF;
            letter-spacing: -0.5px;
        }
        .logo span {
            background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #F8FAFC;
        }
        .message {
            color: #94A3B8;
            font-size: 16px;
            margin-bottom: 32px;
        }
        .otp-container {
            background-color: rgba(14, 165, 233, 0.1);
            border: 1px solid rgba(14, 165, 233, 0.2);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 32px;
        }
        .otp-code {
            font-family: monospace;
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 8px;
            color: #38BDF8;
            margin: 0;
        }
        .warning {
            font-size: 14px;
            color: #F87171;
            margin-top: 16px;
        }
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 14px;
            color: #64748B;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo"><span>RAONE</span></div>
            <h1 class="title">Password Reset Request</h1>
            <p class="message">
                We received a request to reset your password. Use the verification code below to complete the process.
            </p>
            
            <div class="otp-container">
                <p class="otp-code">{{ otp_code }}</p>
            </div>
            
            <p class="warning">
                This code is only valid for <strong>90 seconds</strong>.<br>
                If you did not request this, please ignore this email.
            </p>
        </div>
        
        <div class="footer">
            &copy; 2026 RAONE Platform. All rights reserved.
        </div>
    </div>
</body>
</html>
